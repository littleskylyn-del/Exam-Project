<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Seyifunmi Weather App</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Seyifunmi Weather App</h1>

      <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name" />

        <button id="searchBtn">Search</button>
      </div>
    </header>

    <main>
      <p id="loading"></p>

      <p id="error"></p>

      <section class="hero">
        <div class="weather-icon" id="icon">☀</div>

        <h2 id="city">City Name</h2>

        <h1 id="temperature">--°C</h1>

        <p id="description">Weather condition</p>
      </section>

      <section class="stats">
        <div>
          <h3>Humidity</h3>

          <p id="humidity">--%</p>
        </div>

        <div>
          <h3>Wind Speed</h3>

          <p id="wind">-- km/h</p>
        </div>

        
      </section>

      <section class="forecast">
        <h2>5 Day Forecast</h2>

        <div id="forecastContainer" class="forecast-grid"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
