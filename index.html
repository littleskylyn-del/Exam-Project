<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Weather App</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="weather-app">
      <header>
        <h2>☁ Weather App</h2>

        <div class="search">
          <input id="cityInput" placeholder="Enter city name" />

          <button id="searchBtn">Search</button>
        </div>
      </header>

      <p id="loading"></p>

      <p id="error"></p>

      <section class="weather-card">
        <div id="icon" class="icon">☀</div>

        <h3 id="city">Lagos, Nigeria</h3>

        <h1 id="temperature">32°C</h1>

        <p id="description">Sunny - Feels like 36°C</p>
      </section>

      <section class="stats">
        <div>
          <h4>Humidity</h4>

          <p id="humidity">78%</p>
        </div>

        <div>
          <h4>Wind</h4>

          <p id="wind">14 km/h</p>
        </div>

        <div>
          <h4>UV Index</h4>

          <p>High</p>
        </div>
      </section>

      <section class="forecast">
        <h4>5-DAY FORECAST</h4>

        <div id="forecastContainer"></div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
